# =============================================================================
# Demo Fiera Agibot X2 - Pick & Place Cialde Caffe
# Configurazione principale
# =============================================================================

# --- Robot ---
robot:
  pc2_ip: "10.0.1.41"
  local_ip: "10.0.1.2"
  # ATTENZIONE: Mai usare PC1 (10.0.1.40) per sviluppo SDK
  heartbeat_timeout_s: 5.0
  emergency_stop_topic: "/emergency_stop"

# --- Tavoli ---
tables:
  height_range_m: [0.6, 0.9]       # Altezza tavoli attesa (RANSAC)
  size_m: [0.70, 0.70]             # Dimensione tavoli 70x70cm
  approach_distance_m: 0.45        # Distanza robot-bordo tavolo per manipolazione
  coarse_approach_distance_m: 1.0  # Distanza inizio approccio fine
  table_moved_threshold_m: 0.15    # Soglia spostamento per riscansione

# --- Cialde ---
pods:
  diameter_mm: 44.0
  height_mm: 12.0
  max_per_box: 20
  box_grid_rows: 4
  box_grid_cols: 5
  box_grid_spacing_mm: 50.0

# --- Scatola ---
box:
  type: "lid"                       # "lid" = coperchio separato (raccomandato)
  width_mm: 280.0                   # ~5 cialde * 50mm + margini
  depth_mm: 230.0                   # ~4 cialde * 50mm + margini
  height_mm: 60.0
  lid_height_mm: 15.0

# --- Percezione ---
perception:
  camera_topic_rgb: "/camera/color/image_raw"
  camera_topic_depth: "/camera/depth/image_rect_raw"
  camera_info_topic: "/camera/color/camera_info"
  pointcloud_topic: "/camera/depth/color/points"
  camera_rate_hz: 10
  yolo:
    model_path: "config/yolo_cialde.pt"
    confidence_threshold: 0.6
    nms_threshold: 0.45
    input_size: 640
    use_tensorrt: true
    tensorrt_fp16: true
  hough_fallback:
    enabled: true
    min_radius_px: 15
    max_radius_px: 50
    dp: 1.2
    min_dist_px: 40
    param1: 50
    param2: 30
  ransac:
    distance_threshold_m: 0.01
    num_iterations: 1000
    min_points: 500

# --- Manipolazione ---
manipulation:
  arm:
    default_side: "left"            # Braccio principale per pick
    ik_max_iterations: 100
    ik_tolerance: 0.001             # 1mm
    joint_margin_deg: 5.0           # Margine dai limiti giunti
  gripper:
    open_position: 0.7              # Apertura per cialde
    close_position: 0.0
    grasp_effort: 0.4               # Gentile per cialde
    box_grasp_effort: 0.8           # Piu forte per scatole
    stall_state: 2                  # Stato gripper = presa OK
  trajectory:
    max_velocity: 1.0               # rad/s
    max_acceleration: 2.0           # rad/s^2
    max_jerk: 10.0                  # rad/s^3
  pick:
    pre_grasp_height_m: 0.15        # Altezza sopra oggetto
    approach_height_m: 0.05         # Altezza inizio discesa
    contact_force_threshold: 0.5    # N - soglia contatto
  place:
    pre_place_height_m: 0.10
    release_height_m: 0.02

# --- Navigazione ---
navigation:
  max_speed_ms: 0.30                # Velocita max conservativa per demo pubblica
  fine_approach_speed_ms: 0.15      # Velocita approccio fine
  angular_speed_rads: 0.3           # Velocita rotazione
  visual_servoing:
    gain_linear: 0.5
    gain_angular: 0.8
    convergence_threshold_m: 0.02
    convergence_threshold_rad: 0.05

# --- Interazione ---
interaction:
  robot_name: "Ciruzzo"
  tts:
    language: "it"
    rate: 150                        # Parole al minuto (per pyttsx3)
    volume: 0.8
    # OpenAI TTS (priorita 1 - voce naturale eccellente)
    openai_voice: "nova"             # nova, alloy, echo, fable, onyx, shimmer
    openai_model: "tts-1"            # tts-1 (veloce) o tts-1-hd (alta qualita)
    openai_speed: 1.0                # 0.25 - 4.0
    # Fallback: gTTS (priorita 2 - Google, serve internet)
    # Fallback: pyttsx3 (priorita 3 - offline, voci di sistema)
  emoji:
    duration_s: 3.0
  led:
    brightness: 0.7
    breathing_period_s: 2.0
    blinking_period_s: 0.5
  # --- Riconoscimento vocale (Whisper) ---
  speech:
    whisper_model: "base"            # tiny, base, small, medium, large
    language: "it"
    sample_rate: 16000
    silence_threshold: 0.01          # Soglia silenzio (normalizzata)
    silence_duration_s: 1.5          # Secondi di silenzio per fine ascolto
    max_record_s: 15.0               # Durata max registrazione
    mic_device: null                 # null = default, oppure indice device
  # --- Interazione vocale ---
  voice:
    wake_word: "ciruzzo"
    wake_word_check_interval_s: 2.0  # Ogni quanto controlla il wake word in IDLE
    chat_timeout_s: 60.0             # Timeout conversazione
    max_chat_turns: 10               # Max turni conversazione
  # --- ChatGPT ---
  chat:
    openai_api_key: ""               # Lascia vuoto! Usa variabile d'ambiente OPENAI_API_KEY
    model: "gpt-4o-mini"
    max_tokens: 150
    temperature: 0.8
    max_history: 10                  # Turni di storico conversazione

# --- Sicurezza ---
safety:
  motor_temp_limit_c: 60.0
  watchdog_period_s: 1.0
  watchdog_timeout_s: 5.0
  max_joint_velocity_rads: 2.0
  trajectory_check_enabled: true
  estop_required: true

# --- Logging ---
logging:
  level: "INFO"
  log_dir: "/tmp/agibotx2_demo"
  save_images: false
  save_pointclouds: false
