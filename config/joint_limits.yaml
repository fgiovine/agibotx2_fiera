# =============================================================================
# Agibot X2 - Limiti Giunti Braccio
# Valori da specifica SDK Agibot X2, con margine di sicurezza
# =============================================================================

# Braccio sinistro (7 DOF)
left_arm:
  joint_names:
    - "left_shoulder_pitch"
    - "left_shoulder_roll"
    - "left_shoulder_yaw"
    - "left_elbow_pitch"
    - "left_wrist_yaw"
    - "left_wrist_pitch"
    - "left_wrist_roll"
  position_limits_deg:
    # [min, max] - limiti fisici
    - [-180.0, 60.0]     # shoulder_pitch
    - [-15.0, 180.0]     # shoulder_roll
    - [-90.0, 90.0]      # shoulder_yaw
    - [-150.0, 0.0]      # elbow_pitch
    - [-90.0, 90.0]      # wrist_yaw
    - [-45.0, 45.0]      # wrist_pitch
    - [-180.0, 180.0]    # wrist_roll
  velocity_limits_degs:
    - 120.0
    - 120.0
    - 120.0
    - 150.0
    - 180.0
    - 180.0
    - 180.0
  torque_limits_nm:
    - 40.0
    - 40.0
    - 20.0
    - 20.0
    - 10.0
    - 10.0
    - 5.0

# Braccio destro (7 DOF)
right_arm:
  joint_names:
    - "right_shoulder_pitch"
    - "right_shoulder_roll"
    - "right_shoulder_yaw"
    - "right_elbow_pitch"
    - "right_wrist_yaw"
    - "right_wrist_pitch"
    - "right_wrist_roll"
  position_limits_deg:
    - [-180.0, 60.0]
    - [-180.0, 15.0]
    - [-90.0, 90.0]
    - [-150.0, 0.0]
    - [-90.0, 90.0]
    - [-45.0, 45.0]
    - [-180.0, 180.0]
  velocity_limits_degs:
    - 120.0
    - 120.0
    - 120.0
    - 150.0
    - 180.0
    - 180.0
    - 180.0
  torque_limits_nm:
    - 40.0
    - 40.0
    - 20.0
    - 20.0
    - 10.0
    - 10.0
    - 5.0

# Testa (2 DOF)
head:
  joint_names:
    - "head_yaw"
    - "head_pitch"
  position_limits_deg:
    - [-90.0, 90.0]
    - [-30.0, 30.0]
  velocity_limits_degs:
    - 60.0
    - 60.0

# Vita (3 DOF)
waist:
  joint_names:
    - "waist_yaw"
    - "waist_pitch"
    - "waist_roll"
  position_limits_deg:
    - [-90.0, 90.0]
    - [-20.0, 20.0]
    - [-15.0, 15.0]
  velocity_limits_degs:
    - 60.0
    - 60.0
    - 60.0

# Margine di sicurezza (gradi da sottrarre dai limiti fisici)
safety_margin_deg: 5.0
